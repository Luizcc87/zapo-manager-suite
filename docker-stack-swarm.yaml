version: '3.8'

# Docker Swarm stack — zapo-manager
#
# ─── DEPLOY ────────────────────────────────────────────────────────────────────
#   docker stack deploy -c docker-stack-swarm.yaml zapo --with-registry-auth
#
# ─── PRÉ-REQUISITO: rede pública ───────────────────────────────────────────────
#   docker network create --driver overlay --attachable network_swarm_public
#
# ─── VARIÁVEIS DE AMBIENTE (exportar antes do deploy) ─────────────────────────
#
#   GLOBAL_API_KEY   — chave mestra da API; qualquer cliente precisa dela no
#                      header "apikey". Use 32+ caracteres aleatórios.
#                      Gerar: openssl rand -hex 32
#                      Exemplo: export GLOBAL_API_KEY=2b78db0871abc2123b1fa369482860feb94f2f3d3c65a93cb7b1a1a27dd84e9f
#
#   POSTGRES_PASSWORD — senha do banco de dados PostgreSQL.
#                      Gerar: openssl rand -base64 24
#                      Exemplo: export POSTGRES_PASSWORD=K7mP2xQnR9vLdJhF4sTuYwZcB1eN8oAg
#
#   SERVER_URL       — URL pública do servidor (usada para links absolutos).
#                      Exemplo: export SERVER_URL=https://zapo.seu-dominio.com
#
#   WEBHOOK_URL      — URL de destino para eventos WhatsApp (opcional).
#                      Exemplo: export WEBHOOK_URL=https://seu-dominio.com/webhook/zapo
#                      Deixar vazio se não usar: export WEBHOOK_URL=
#
#   SESSION_DEVICE_BROWSER — Browser anunciado ao WhatsApp no pareamento (padrão: chrome).
#                      Valores: chrome, chromium, firefox, safari, edge, opera, ie
#                      Controla o label exibido na lista "Dispositivos Vinculados" do celular.
#                      Exemplo: export SESSION_DEVICE_BROWSER=chrome
#
#   SESSION_DEVICE_OS — Nome do SO exibido na lista "Dispositivos Vinculados" (padrão: Linux).
#                      Exemplo: export SESSION_DEVICE_OS=Linux
#
# ─── VARIÁVEIS OPCIONAIS — PROXY ──────────────────────────────────────────────
#
#   PROXY_API_KEY    — Chave da API do provedor de proxies.
#                      Quando definida, o servidor registra automaticamente seu
#                      IP público no provedor ao iniciar (útil em Docker Swarm
#                      onde o IP do nó pode mudar entre deploys).
#                      Exemplo: export PROXY_API_KEY=Token abcdef1234567890
#
#   PROXY_IP_AUTH_URL — URL do endpoint de autorização de IPs do provedor.
#                      Recebe POST com body {"ip_address": "<ip>"}.
#                      Exemplo: export PROXY_IP_AUTH_URL=https://proxy.exemplo.com/api/v2/ipauthorization/
#
#   PROXY_REPLACE_API_URL — URL do endpoint de substituição de proxy.
#                      Ativado pelo botão "Substituir IP" no painel.
#                      Exemplo: export PROXY_REPLACE_API_URL=https://proxy.exemplo.com/api/v3/proxy/replace/
#
#   PROXY_REPLACE_API_KEY — Chave para o endpoint de substituição.
#                      Pode ser igual a PROXY_API_KEY ou diferente.
#                      Exemplo: export PROXY_REPLACE_API_KEY=Token abcdef1234567890
#
# ─── VARIÁVEIS OPCIONAIS — COMPORTAMENTO ──────────────────────────────────────
#
#   QRCODE_LIMIT     — Número máximo de QR Codes gerados antes de parar tentativas
#                      e marcar instância como desconectada. Padrão: 5.
#                      Equivalente ao QRCODE_LIMIT da Evolution API.
#                      Exemplo: export QRCODE_LIMIT=10
#
# ─── CLOUDFLARE TUNNEL ────────────────────────────────────────────────────────
#   Para expor o painel via Cloudflare Tunnel, crie uma rota pública apontando
#   para o serviço interno do Swarm:
#
#   Nome do serviço (DNS interno do Swarm):  zapo_app
#   Porta:                                   8080
#   URL de destino no tunnel:                http://zapo_app:8080
#
#   O cloudflared deve rodar na mesma rede overlay (network_swarm_public) ou
#   no host com acesso à porta publicada.
#
#   Exemplo de config no dashboard Cloudflare Tunnel:
#     Public hostname : zapo.seu-dominio.com
#     Service type    : HTTP
#     URL             : zapo_app:8080
#
# ───────────────────────────────────────────────────────────────────────────────

services:

  app:
    image: lc1868/zapo-manager:latest
    environment:
      - DATABASE_URL=postgresql://zapo:${POSTGRES_PASSWORD:-zapo}@zapo-db:5432/zapo?schema=public
      - REDIS_URL=redis://zapo-redis:6379/0
      - GLOBAL_API_KEY=${GLOBAL_API_KEY:?GLOBAL_API_KEY obrigatorio. Gere com: openssl rand -hex 32}
      - SERVER_URL=${SERVER_URL:-http://localhost:8080}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - SESSION_DEVICE_BROWSER=${SESSION_DEVICE_BROWSER:-chrome}
      - SESSION_DEVICE_OS=${SESSION_DEVICE_OS:-Linux}
      - PROXY_API_KEY=${PROXY_API_KEY:-}
      - PROXY_IP_AUTH_URL=${PROXY_IP_AUTH_URL:-}
      - PROXY_REPLACE_API_URL=${PROXY_REPLACE_API_URL:-}
      - PROXY_REPLACE_API_KEY=${PROXY_REPLACE_API_KEY:-}
      # ── PERSISTÊNCIA DE DADOS ──────────────────────────────────────────────────
      - SAVE_DATA_NEW_MESSAGE=${SAVE_DATA_NEW_MESSAGE:-false}
      - SAVE_DATA_CONTACTS=${SAVE_DATA_CONTACTS:-false}
      - SAVE_DATA_HISTORIC=${SAVE_DATA_HISTORIC:-false}
      - QRCODE_LIMIT=${QRCODE_LIMIT:-5}
      - PORT=8080
      - NODE_ENV=production
    networks:
      - network_swarm_public
      - zapo-internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first   # Swarm Safety: libera Redis lock antes de subir nova réplica

  zapo-db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_USER=zapo
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-zapo}
      - POSTGRES_DB=zapo
    volumes:
      - zapo-db-data:/var/lib/postgresql
    networks:
      - zapo-internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  zapo-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - zapo-redis-data:/data
    networks:
      - zapo-internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public
  zapo-internal:
    driver: overlay

volumes:
  zapo-db-data:
  zapo-redis-data:
