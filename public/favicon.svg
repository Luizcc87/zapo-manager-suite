<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C9200"/>
      <stop offset="100%" stop-color="#82E600"/>
    </linearGradient>
  </defs>

  <!-- Hexagon border (pointy-top, center 50,50, R=46) -->
