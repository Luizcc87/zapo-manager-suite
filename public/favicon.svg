  <!-- Z letter -->
  <text
    x="50" y="76"
    text-anchor="middle"
    font-family="Nunito, Poppins, 'Arial Rounded MT Bold', Arial, sans-serif"
    font-size="62"
    font-weight="900"
    fill="url(#g)">Z</text>
</svg>
